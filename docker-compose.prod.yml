services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_USE_CSHARP_API: ${VITE_USE_CSHARP_API:-true}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
        VITE_PUBLIC_BASE_PATH: ${VITE_PUBLIC_BASE_PATH:-/}
    expose:
      - 80
    environment:
      - NODE_ENV=production
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL}
      - SUPABASE_POSTGREST_URL=${SUPABASE_POSTGREST_URL}
      - SUPABASE_FUNCTIONS_URL=${SUPABASE_FUNCTIONS_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
      - JWT__Secret=${JWT_SECRET}
      - JWT__Issuer=${JWT_ISSUER:-https://api.retroscope.app}
      - ALLOW_ORIGINS=${ALLOW_ORIGINS}
      - ConnectionStrings__DefaultConnection=${DATABASE_URL}
      - OAuth__GitHub__ClientId=${GITHUB_CLIENT_ID}
      - OAuth__GitHub__ClientSecret=${GITHUB_CLIENT_SECRET}
      - OAuth__GitHub__RedirectUri=${OAUTH_GITHUB_REDIRECT_URI}
      - OAuth__Google__ClientId=${GOOGLE_CLIENT_ID}
      - OAuth__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - OAuth__Google__RedirectUri=${OAUTH_GOOGLE_REDIRECT_URI}
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G

