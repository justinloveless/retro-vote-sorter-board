services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_USE_CSHARP_API: 'true'
        VITE_API_BASE_URL: 'http://localhost:5174'
    ports:
      - '5174:80'
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development
      - VITE_USE_CSHARP_API=true
      - VITE_API_BASE_URL=http://localhost:5174
    depends_on:
      - api
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  app-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.git
      - /app/dist
      - /app/api
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - '8081:8081'
    environment:
      - NODE_ENV=development
      - VITE_USE_CSHARP_API=true
      - VITE_API_BASE_URL=http://localhost:5228
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api-dev
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '5227:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - SUPABASE_URL=https://nwfwbjmzbwuyxehindpv.supabase.co
      - SUPABASE_JWKS_URL=https://nwfwbjmzbwuyxehindpv.supabase.co/auth/v1/.well-known/jwks.json
      - SUPABASE_POSTGREST_URL=https://nwfwbjmzbwuyxehindpv.supabase.co/rest/v1
      - SUPABASE_FUNCTIONS_URL=https://nwfwbjmzbwuyxehindpv.supabase.co/functions/v1
      - SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53Zndiam16Ynd1eXhlaGluZHB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg1MjkyMzksImV4cCI6MjA2NDEwNTIzOX0.s_vI6z46NAYlpB8K0wznCWEr_cFcnsHh7Qn4LmsUZU0
      - ALLOW_ORIGINS=http://localhost:5174,http://localhost:5173,http://localhost:3000,http://localhost:8081
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M

  api-dev:
    image: mcr.microsoft.com/dotnet/sdk:8.0
    working_dir: /src
    volumes:
      - ./api:/src
      - api-dev-packages:/root/.nuget/packages
    command: >
      sh -c "dotnet restore src/Retroscope.Api/Retroscope.Api.csproj &&
             dotnet watch run --project src/Retroscope.Api/Retroscope.Api.csproj --no-restore --no-launch-profile"
    ports:
      - '5228:8080'
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=retroscope;Username=retroscope_app;Password=retroscope_app_pass
      - JWT__Secret=your-super-secret-key-min-32-chars-long-for-jwt-signing
      - JWT__Issuer=http://localhost:5228
      - OAuth__GitHub__ClientId=${GITHUB_CLIENT_ID:-your-github-client-id}
      - OAuth__GitHub__ClientSecret=${GITHUB_CLIENT_SECRET:-your-github-client-secret}
      - OAuth__GitHub__RedirectUri=http://localhost:5228/auth/v1/callback
      - OAuth__Google__ClientId=${GOOGLE_CLIENT_ID:-your-google-client-id}
      - OAuth__Google__ClientSecret=${GOOGLE_CLIENT_SECRET:-your-google-client-secret}
      - OAuth__Google__RedirectUri=http://localhost:5228/auth/v1/callback
      - SUPABASE_URL=https://nwfwbjmzbwuyxehindpv.supabase.co
      - SUPABASE_JWKS_URL=https://nwfwbjmzbwuyxehindpv.supabase.co/auth/v1/.well-known/jwks.json
      - SUPABASE_POSTGREST_URL=https://nwfwbjmzbwuyxehindpv.supabase.co/rest/v1
      - SUPABASE_FUNCTIONS_URL=https://nwfwbjmzbwuyxehindpv.supabase.co/functions/v1
      - SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im53Zndiam16Ynd1eXhlaGluZHB2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDg1MjkyMzksImV4cCI6MjA2NDEwNTIzOX0.s_vI6z46NAYlpB8K0wznCWEr_cFcnsHh7Qn4LmsUZU0
      - ALLOW_ORIGINS=http://localhost:5174,http://localhost:5173,http://localhost:3000,http://localhost:8081
      - POSTGRES_CONNECTION_STRING=Host=postgres;Port=5432;Database=retroscope;Username=retroscope_app;Password=retroscope_app_pass
      - LOCAL_POSTGREST_URL=http://postgrest:3000
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:15
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/postgres/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=retroscope
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    ports:
      - '5555:80'
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./api/postgres/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:v12.2.3
    ports:
      - '3001:3000'
    environment:
      - PGRST_DB_URI=postgresql://retroscope_app:retroscope_app_pass@postgres:5432/retroscope
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${JWT_SECRET:-your-super-secret-key-min-32-chars-long-for-jwt-signing}
      - PGRST_DB_EXTRA_SEARCH_PATH=public,auth
      - PGRST_OPENAPI_SERVER_PROXY_URI=http://localhost:3001
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  wiremock:
    image: wiremock/wiremock:latest
    ports:
      - '8080:8080'
    volumes:
      - ./api/tests/Retroscope.Api.IntegrationTests/wiremock-mappings:/home/wiremock
    environment:
      - WIREMOCK_PORT=8080
    restart: unless-stopped
    profiles:
      - integration-test

  # tts-server:
  #   image: ghcr.io/coqui-ai/tts
  #   ports:
  #     - "5002:5002"
  #   volumes:
  #     - tts_models:/root/.local/share/tts
  #   gpus:
  #     - driver: nvidia
  #       count: all
  #   # Override entrypoint to call python3 directly
  #   entrypoint:
  #     - python3
  #     - TTS/server/server.py
  #   # Now give all of your server flags as a YAML list
  #   command:
  #     - --model_name
  #     - tts_models/en/ljspeech/tacotron2-DDC_ph
  #     - --use_cuda
  #     - "true"
  #   restart: unless-stopped
