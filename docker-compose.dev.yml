services:
  app-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.git
      - /app/dist
      - /app/api
    command: sh -c "npm install && npm run dev -- --host"
    expose:
      - 8081
    environment:
      - NODE_ENV=development
      - VITE_USE_CSHARP_API=true
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:5228}
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api-dev
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8081']
      interval: 30s
      timeout: 10s
      retries: 3

  api-dev:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src
    volumes:
      - ./api:/src
      - api-dev-packages:/root/.nuget/packages
    command: >
      sh -c "dotnet restore src/Retroscope.Api/Retroscope.Api.csproj &&
             dotnet watch run --project src/Retroscope.Api/Retroscope.Api.csproj --no-restore --no-launch-profile"
    expose:
      - 8080
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=retroscope;Username=retroscope_app;Password=retroscope_app_pass
      - JWT__Secret=${JWT_SECRET:-your-super-secret-key-min-32-chars-long-for-jwt-signing}
      - JWT__Issuer=${JWT_ISSUER:-http://localhost:5228}
      - OAuth__GitHub__ClientId=${GITHUB_CLIENT_ID}
      - OAuth__GitHub__ClientSecret=${GITHUB_CLIENT_SECRET}
      - OAuth__GitHub__RedirectUri=${OAUTH_GITHUB_REDIRECT_URI:-http://localhost:5228/auth/v1/callback}
      - OAuth__Google__ClientId=${GOOGLE_CLIENT_ID}
      - OAuth__Google__ClientSecret=${GOOGLE_CLIENT_SECRET}
      - OAuth__Google__RedirectUri=${OAUTH_GOOGLE_REDIRECT_URI:-http://localhost:5228/auth/v1/callback}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_JWKS_URL=${SUPABASE_JWKS_URL}
      - SUPABASE_POSTGREST_URL=${SUPABASE_POSTGREST_URL}
      - SUPABASE_FUNCTIONS_URL=${SUPABASE_FUNCTIONS_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - ALLOW_ORIGINS=${ALLOW_ORIGINS:-http://localhost:8081}
      - POSTGRES_CONNECTION_STRING=Host=postgres;Port=5432;Database=retroscope;Username=retroscope_app;Password=retroscope_app_pass
      - LOCAL_POSTGREST_URL=http://postgrest:3000
      - DOTNET_USE_POLLING_FILE_WATCHER=true
    depends_on:
      postgres:
        condition: service_healthy
      postgrest:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8080/healthz']
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15
    expose:
      - 5432
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./api/postgres/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_DB=retroscope
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    expose:
      - 80
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL:-admin@admin.com}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD:-admin}
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./api/postgres/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgrest:
    image: postgrest/postgrest:v12.2.3
    expose:
      - 3000
    environment:
      - PGRST_DB_URI=postgresql://retroscope_app:retroscope_app_pass@postgres:5432/retroscope
      - PGRST_DB_SCHEMA=public
      - PGRST_DB_ANON_ROLE=anon
      - PGRST_JWT_SECRET=${JWT_SECRET:-your-super-secret-key-min-32-chars-long-for-jwt-signing}
      - PGRST_DB_EXTRA_SEARCH_PATH=public,auth
      - PGRST_OPENAPI_SERVER_PROXY_URI=${POSTGREST_PROXY_URI:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3000']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  api-dev-packages:
  postgres-data:
  pgadmin-data:

